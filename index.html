<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <header>

        <h1>Formulário: </h1>

    </header>

    <section>
        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome" required> <br>

            <label for="email">E-mail: </label>
            <input type="email" id="email" name="email" required><br>

            <label for="idade">Idade: </label>
            <input type="datetime" id="idade" name="idade" required><br>

            <label for="materia">Para qual matéria você está se candidatando para lecionar?</label>
            <select name="materia" id="materia"><br>
                <option value="matematica">Matemática</option>
                <option value="Portugues">Português</option>
                <option value="biologia">Biologia</option>
                <option value="ciencias">Ciências</option>
                <option value="historia">História</option>
                <option value="geografia">Geografia</option>
                <option value="artes">Artes</option>

                <label for="escolaridade">Nível de escolaridade: </label>
                <select name="escolaridade" id="escolaridade">
                    <option value="superiorcom">Superior completo</option>
                    <option value="mestradocursando">Cursando mestrado</option>
                    <option value="mestradocompleto">Mestrado completo</option>
                    <option value="doutoradocursando">Cursando doutorado</option>
                    <option value="doutoradocompleto">Doutorado completo</option><br>

                    <label for="descricao">Faça uma breve descrição sobre você</label>
                    <textarea name="descricao" id="descricaoA" required></textarea> <br>



        </form>
    </section>
</body>

</html>
