<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <header>

        <h1>Formulário: </h1>

    </header>

  
<section>
    <form action="" method="POST">
        <label for="nome">Nome: </label>
        <input type="text" id="nome" name="nome" required> <br><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Alterado para type="number" já que é para idade. Se for data de nascimento, use type="date" -->
        <label for="idade">Idade: </label>
        <input type="number" id="idade" name="idade" min="18" required><br><br>

        <label for="materia">Para qual matéria você está se candidatando para lecionar?</label><br>
        <select name="materia" id="materia" required>
            <!-- Adicionado um valor vazio para forçar o usuário a escolher uma opção -->
            <option value="" disabled selected>Selecione uma matéria</option>
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="ciencias">Ciências</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="artes">Artes</option>
        </select><br><br> <!-- Faltava fechar a tag </select> no seu código -->

        <label for="escolaridade">Nível de escolaridade: </label><br>
        <select name="escolaridade" id="escolaridade" required>
            <option value="" disabled selected>Selecione seu nível</option>
            <option value="superiorcom">Superior completo</option>
            <option value="mestradocursando">Cursando mestrado</option>
            <option value="mestradocompleto">Mestrado completo</option>
            <option value="doutoradocursando">Cursando doutorado</option>
            <option value="doutoradocompleto">Doutorado completo</option>
        </select><br><br> <!-- Faltava fechar a tag </select> no seu código -->

        <label for="descricao">Faça uma breve descrição sobre você:</label><br>
        <textarea name="descricao" id="descricao" rows="4" required></textarea> <br><br>

        <!-- Adicionado um botão para enviar o formulário -->
        <button type="submit">Enviar Candidatura</button>
    </form>
</section>
</body>

</html>
